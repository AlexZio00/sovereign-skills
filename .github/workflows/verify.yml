name: Verify Marketplace Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify-marketplace:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify marketplace.json <-> plugin.json <-> directory <-> SKILL.md consistency
        run: python3 scripts/verify_marketplace.py

  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
